version: '3.8'

services:
  lunarlander-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lunarlander-web
    ports:
      - "8501:8501"
    volumes:
      - ./experiments:/app/experiments
      - ./models:/app/models
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLEXSRFPROTECTION=false
    restart: unless-stopped
    # Optional: limit resources
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
